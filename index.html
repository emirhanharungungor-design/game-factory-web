<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#05060f">
<title>NEON CATCH — by Florentia</title>
<style>
  html,body{margin:0;height:100%;background:#05060f;overflow:hidden;
    font-family:'Trebuchet MS',system-ui,sans-serif;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  #c{display:block;touch-action:none;position:fixed;inset:0;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
"use strict";
/* ===================== FLORENTIA GAME SHELL + NEON CATCH =====================
   Standart kabuk: Splash (BY FLORENTIA) -> Menü -> Ayarlar(Müzik/Efekt/Titreşim) -> Oyun -> Game Over.
   Bu kabuk tüm oyunlara uygulanır. Oynanış: tek parmak yakala/kaç + kombo + bol juice. */

const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W=0, H=0, DPR=1;
function resize(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(player){ player.y=H-Math.max(110,H*0.16); }
}
window.addEventListener('resize', resize);

const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const easeOut=t=>1-Math.pow(1-t,3);
const easeOutBack=t=>{const c=2.70158;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2);};
const easeInOut=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
function hsl(h,s,l,a=1){return `hsla(${h},${s}%,${l}%,${a})`;}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

/* ===================== AYARLAR ===================== */
const Settings = {
  music: localStorage.getItem('nc_music')!=='0',
  sfx:   localStorage.getItem('nc_sfx')!=='0',
  haptics: localStorage.getItem('nc_haptics')!=='0',
};
function saveSettings(){
  localStorage.setItem('nc_music',Settings.music?'1':'0');
  localStorage.setItem('nc_sfx',Settings.sfx?'1':'0');
  localStorage.setItem('nc_haptics',Settings.haptics?'1':'0');
}
function buzz(p){ if(Settings.haptics && navigator.vibrate) navigator.vibrate(p); }

/* ===================== SES ===================== */
const Audio = (()=>{
  let ctxA=null, master=null, musicGain=null, sfxOn=Settings.sfx, musicOn=Settings.music;
  let beat=0, beatTimer=0, intensity=0;
  function ensure(){
    if(ctxA) return;
    ctxA = new (window.AudioContext||window.webkitAudioContext)();
    master = ctxA.createGain(); master.gain.value=0.9; master.connect(ctxA.destination);
    musicGain = ctxA.createGain(); musicGain.gain.value=0.0; musicGain.connect(master);
  }
  function resume(){ ensure(); if(ctxA.state==='suspended') ctxA.resume(); }
  function tone(freq,dur,type,vol,sweep,dest){
    if(!ctxA) return;
    const o=ctxA.createOscillator(), g=ctxA.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,ctxA.currentTime);
    if(sweep) o.frequency.exponentialRampToValueAtTime(Math.max(40,freq+sweep),ctxA.currentTime+dur);
    g.gain.setValueAtTime(0.0001,ctxA.currentTime);
    g.gain.exponentialRampToValueAtTime(vol,ctxA.currentTime+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,ctxA.currentTime+dur);
    o.connect(g); g.connect(dest||master); o.start(); o.stop(ctxA.currentTime+dur+0.02);
  }
  function noise(dur,vol,dest,hp){
    if(!ctxA) return;
    const n=ctxA.createBufferSource(), buf=ctxA.createBuffer(1,ctxA.sampleRate*dur,ctxA.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    n.buffer=buf; const g=ctxA.createGain(); g.gain.value=vol;
    const f=ctxA.createBiquadFilter(); f.type=hp?'highpass':'lowpass'; f.frequency.value=hp||900;
    n.connect(f); f.connect(g); g.connect(dest||master); n.start();
  }
  const PENT=[0,3,5,7,10];
  function collect(combo){ if(!sfxOn)return; const step=PENT[combo%PENT.length];
    const base=520*Math.pow(2,(step+Math.min(24,combo))/12);
    tone(base,0.16,'triangle',0.26,base*0.5); tone(base*1.5,0.1,'sine',0.1); }
  function gold(){ if(!sfxOn)return; [0,4,7,12].forEach((s,i)=>setTimeout(()=>tone(660*Math.pow(2,s/12),0.18,'triangle',0.3,200),i*55)); }
  function miss(){ if(!sfxOn)return; tone(220,0.18,'sawtooth',0.16,-120); }
  function hit(){ if(!sfxOn)return; noise(0.4,0.5); tone(110,0.5,'sawtooth',0.32,-70); }
  function milestone(){ if(!sfxOn)return; [0,7,12,16].forEach((s,i)=>setTimeout(()=>tone(440*Math.pow(2,s/12),0.22,'square',0.2,80),i*70)); }
  function record(){ if(!sfxOn)return; [0,4,7,12,16,19].forEach((s,i)=>setTimeout(()=>tone(523*Math.pow(2,s/12),0.3,'triangle',0.26,120),i*90)); }
  function tap(){ if(!sfxOn)return; tone(820,0.05,'square',0.12); }
  function whoosh(){ if(!sfxOn)return; noise(0.35,0.18,null,400); }
  function shoot(){ if(!sfxOn)return; tone(1500+Math.random()*260,0.045,'square',0.045,-760); }   // ufak "pew"
  function hit2(){ if(!sfxOn)return; noise(0.14,0.34); tone(190,0.16,'sawtooth',0.2,-90); }          // tehlike patladı
  function deflect(){ if(!sfxOn)return; tone(2600,0.04,'square',0.05,-500); noise(0.05,0.09,null,5200); } // mermi mayından sekti
  function kick(){ if(!ctxA||!musicOn)return; const o=ctxA.createOscillator(),g=ctxA.createGain();
    o.type='sine'; o.frequency.setValueAtTime(150,ctxA.currentTime); o.frequency.exponentialRampToValueAtTime(46,ctxA.currentTime+0.11);
    g.gain.setValueAtTime(0.55,ctxA.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctxA.currentTime+0.16);
    o.connect(g); g.connect(musicGain); o.start(); o.stop(ctxA.currentTime+0.18); }
  // I–V–vi–IV (öforik pop) — kök/3lü/5li yarım-ton ofsetleri (C tabanlı)
  const C_ROOT=[0,7,9,5], C_3=[4,11,12,9], C_5=[7,14,16,12], BASS=65.41, ARP=523.25;
  function tick(dt, inten){
    if(!ctxA) return;
    intensity = lerp(intensity, inten, 0.05);
    const target = musicOn? (0.11+intensity*0.13):0;
    musicGain.gain.setTargetAtTime(target, ctxA.currentTime, 0.3);
    if(!musicOn) return;
    const bpm=122+intensity*34, spb=60/bpm/4; beatTimer+=dt;     // onaltılık adım
    if(beatTimer>=spb){ beatTimer-=spb; beat=(beat+1)%16;
      const ch=(beat>>2)&3, root=C_ROOT[ch];
      if((beat&3)===0){ kick(); tone(BASS*Math.pow(2,root/12),0.2,'sawtooth',0.2,0,musicGain); }  // four-on-floor + bas
      noise(0.022,((beat&1)?0.07:0.035)+intensity*0.04,musicGain,8000);                           // hi-hat
      if(intensity>0.1){                                                                            // PARLAK ARPEJ (dopamin)
        const steps=[0,C_3[ch]-root,C_5[ch]-root,12], semi=root+steps[beat&3];
        tone(ARP*Math.pow(2,semi/12),0.14,'triangle',0.06+intensity*0.09,0,musicGain);
        if(intensity>0.45) tone(ARP*2*Math.pow(2,semi/12),0.07,'square',0.025+intensity*0.03,0,musicGain);
      }
      if(intensity>0.7 && (beat&7)===6) tone(ARP*Math.pow(2,(root+7)/12),0.1,'sawtooth',0.05,0,musicGain); // enerji stab
    }
  }
  function setSfx(b){ sfxOn=b; }
  function setMusic(b){ musicOn=b; if(ctxA&&musicGain&&!b) musicGain.gain.setTargetAtTime(0,ctxA.currentTime,0.15); }
  return {resume,collect,gold,miss,hit,milestone,record,tap,whoosh,tick,setSfx,setMusic,shoot,hit2,deflect};
})();

/* ===================== HAVUZLAR ===================== */
function Pool(make){ const free=[],used=[];
  return { spawn(){const o=free.pop()||make();used.push(o);return o;},
    update(fn,dt){for(let i=used.length-1;i>=0;i--){if(fn(used[i],dt)===false){free.push(used[i]);used.splice(i,1);}}},
    each(fn){for(const o of used)fn(o);}, get list(){return used;}, clear(){while(used.length)free.push(used.pop());} };
}
const particles=Pool(()=>({})), fallers=Pool(()=>({})), popups=Pool(()=>({})), bullets=Pool(()=>({}));
function burst(x,y,color,n,spd,life=0.6){ for(let i=0;i<n;i++){const p=particles.spawn(),a=rand(0,6.28),s=rand(spd*0.3,spd);
  p.x=x;p.y=y;p.vx=Math.cos(a)*s;p.vy=Math.sin(a)*s;p.life=p.max=rand(life*0.5,life);p.r=rand(2,5);p.color=color;} }
function popup(x,y,txt,color,big){ const p=popups.spawn();p.x=x;p.y=y;p.txt=txt;p.color=color;p.life=p.max=big?1.1:0.85;p.big=!!big;p.vy=big?-70:-90;return p; }
function spark(){ // arka plan yıldız tozu (menü/splash)
  if(Math.random()<0.4){const p=particles.spawn();p.x=rand(0,W);p.y=H+10;p.vx=rand(-10,10);p.vy=rand(-40,-90);
    p.life=p.max=rand(1.5,3);p.r=rand(1,2.5);p.color=`${rand(150,330)|0},90,200`;}
}

/* ===================== DURUM ===================== */
const ST={SPLASH:0,MENU:1,SETTINGS:2,PLAY:3,OVER:4,PAUSE:5,HOWTO:6};
let howtoThenPlay=false;   // kılavuzdan sonra oyuna mı başlanacak (ilk oynayış)
let state=ST.SPLASH, t=0, stateT=0;
let score=0,displayScore=0,combo=1,bestCombo=1,elapsed=0,spawnTimer=0,difficulty=0;
let level=1,levelBase=0,levelGoal=300,levelUpT=0,mineSeen=false;   // AŞAMA + vurulamaz mayın
let best=+localStorage.getItem('nc_best')||0, bestC=+localStorage.getItem('nc_bestc')||0, newRecord=false;
let bestStage=+localStorage.getItem('nc_beststage')||1;
let shake=0,flash=0,flashColor='255,255,255',zoom=1,zoomT=1,hitstop=0,bgPulse=0,hue=190;
let pointerX=0, pointerActive=false;
let fireTimer=0, muzzle=0; const FIRE_INTERVAL=0.2;         // tabanca otomatik ateş (biraz daha yavaş)
let evBig=20, evCross=60, evMega=100, crossT=0, crossSpawn=0;   // zamanlı büyük olaylar
let player={x:0,y:0,tx:0,r:22,squash:1,sx:1,sy:1,trail:[]};
resize();

function goto(s){ stateT=0; state=s; }
function reset(){ particles.clear();fallers.clear();popups.clear();bullets.clear();
  score=0;displayScore=0;combo=1;bestCombo=1;elapsed=0;spawnTimer=0;difficulty=0;newRecord=false;
  level=1;levelBase=0;levelGoal=goalFor(1);levelUpT=0;mineSeen=false;
  player.x=player.tx=pointerX=W/2; player.y=H-Math.max(110,H*0.16); player.trail.length=0;
  shake=0;flash=0;zoom=1;zoomT=1;hitstop=0;fireTimer=0;muzzle=0;
  evBig=20;evCross=60;evMega=100;crossT=0;crossSpawn=0; }
function startGame(){ Audio.resume(); reset(); goto(ST.PLAY); }
function gameOver(){ goto(ST.OVER); Audio.hit(); shake=Math.max(shake,28); doFlash('255,60,90',0.8); hitstop=0.12;
  burst(player.x,player.y,'255,70,110',40,900,0.9); buzz([40,30,80]);
  if(score>best){best=score;newRecord=true;localStorage.setItem('nc_best',best);Audio.record();doFlash('120,255,200',0.7);}
  if(bestCombo>bestC){bestC=bestCombo;localStorage.setItem('nc_bestc',bestC);}
  if(level>bestStage){bestStage=level;localStorage.setItem('nc_beststage',bestStage);} }
function doFlash(c,a){flashColor=c;flash=Math.max(flash,a);}
function zoomPunch(z){zoomT=z;}
/* ---- AŞAMA (STAGE) sistemi ---- */
function goalFor(l){ return 300 + (l-1)*180; }            // her aşama biraz daha uzun
function levelUp(){
  level++; levelBase=score; levelGoal=goalFor(level); levelUpT=1.5;
  hue=(hue+45)%360;                                       // her aşama farklı renk havası
  Audio.record(); zoomPunch(1.22); shake=Math.max(shake,16); doFlash('180,140,255',0.55); hitstop=0.18;
  burst(W/2,H*0.40,'200,150,255',46,760,1.0); burst(W/2,H*0.40,'120,240,255',24,520,0.8);
  buzz([20,30,20,40]);
}
/* ---- toplama / vurma (hem dokunuş hem mermi kullanır) ---- */
function collectFaller(f){
  const gold=f.kind==='gold'; combo++; bestCombo=Math.max(bestCombo,combo);
  const gain=(gold?50:10)*combo; score+=gain;
  popup(f.x,f.y-10,'+'+gain,gold?'255,215,90':'120,240,255',gold);
  burst(f.x,f.y,gold?'255,215,90':'120,240,255',gold?26:14,gold?620:420,0.6);
  doFlash(gold?'255,215,90':'120,240,255',gold?0.30:0.14);
  if(gold){Audio.gold();zoomPunch(1.12);shake=Math.max(shake,8);buzz(25);} else {Audio.collect(combo);buzz(8);}
  if(combo%5===0){Audio.milestone();zoomPunch(1.16);shake=Math.max(shake,10);doFlash('180,120,255',0.3);
    popup(W/2,player.y-90,'KOMBO x'+combo,'200,150,255',true);buzz([15,20,15]);}
}
function destroyHazard(f){   // kırmızı yıldızı vurmak güvenli: yok eder, küçük puan
  score+=5; popup(f.x,f.y,'+5','255,150,150',false);
  burst(f.x,f.y,'255,80,95',20,560,0.6); Audio.hit2(); shake=Math.max(shake,7); buzz(14); doFlash('255,90,110',0.16);
}
function fireBullet(){       // namlu ucundan yukarı ufak mermi
  const b=bullets.spawn(); b.x=player.x; b.y=player.y-player.r-4; b.vy=-760; b.t=0;
  muzzle=1; Audio.shoot();
}
/* ---- ZAMANLI BÜYÜK OLAYLAR ---- */
function weaponDmg(){ return 6 + (level-1)*8; }   // silah gücü HER AŞAMADA artar (1. aşama zayıf)
function spawnBoss(){   // ~20 sn'de bir: ORTADAN büyük kırmızı boss (1000 can — gücün yetince devirirsin)
  const f=fallers.spawn(); f.kind='boss'; f.x=W/2; f.y=-70; f.r=48; f.t=0; f.spin=0; f.dead=false; f.vx=0; f.vy=120+difficulty*45;
  f.hp=1000; f.maxhp=1000;
  popup(W/2,H*0.30,'BOSS! (1000 can — vur ya da kaç)','255,90,90',true); shake=Math.max(shake,9); doFlash('255,70,80',0.3); buzz([30,40,30,40]);
}
function spawnMega(){   // ~100 sn'de bir: büyük YEŞİL +1000 bonus
  const f=fallers.spawn(); f.kind='mega'; f.x=rand(W*0.25,W*0.75); f.y=-60; f.r=34; f.t=0; f.spin=0; f.dead=false; f.vx=0; f.vy=105+difficulty*30;
  popup(W/2,H*0.26,'YEŞİL BONUS +1000!','120,255,150',true); buzz([15,25,15]);
}
function startCrossfire(){   // ~60 sn'de bir: İKİ YANDAN saldırı — ORTADA dur
  crossT=4.5; crossSpawn=0;
  popup(W/2,H*0.30,'İKİ YANDAN — ORTADA DUR!','255,170,90',true); shake=Math.max(shake,7); buzz([20,30,20,30]);
}
function spawnCrossPair(){   // soldan + sağdan; ortada güvenli boşluk bırakır
  const y=rand(H*0.5,H-90), spd=rand(280,380)+difficulty*120;
  const L=fallers.spawn(); L.kind='side'; L.x=-34; L.y=y; L.r=18; L.t=0; L.spin=rand(0,6.28); L.dead=false; L.vy=0; L.vx=spd;  L.stopx=W*0.5-56;
  const R=fallers.spawn(); R.kind='side'; R.x=W+34; R.y=y; R.r=18; R.t=0; R.spin=rand(0,6.28); R.dead=false; R.vy=0; R.vx=-spd; R.stopx=W*0.5+56;
}
function collectMega(f){   // yeşil mega bonus toplandı (mermi ya da dokunuş)
  score+=1000; combo+=2; bestCombo=Math.max(bestCombo,combo);
  popup(f.x,f.y-10,'+1000','120,255,150',true); burst(f.x,f.y,'120,255,150',54,820,1.0); burst(f.x,f.y,'255,255,255',20,500,0.7);
  Audio.record(); zoomPunch(1.26); shake=Math.max(shake,14); doFlash('120,255,150',0.5); buzz([20,40,20,40]);
}

/* ===================== INPUT + BUTONLAR ===================== */
let BTNS=[]; let pauseBtn={x:1e9,y:1e9,w:0,h:0};
function setPointer(e){ pointerX=clamp(e.clientX,0,W); pointerActive=true; }
cv.addEventListener('pointerdown', e=>{
  Audio.resume();
  if(state===ST.SPLASH){ goto(ST.MENU); Audio.whoosh(); return; }
  if(state===ST.PLAY){
    if(e.clientX>=pauseBtn.x&&e.clientX<=pauseBtn.x+pauseBtn.w&&e.clientY>=pauseBtn.y&&e.clientY<=pauseBtn.y+pauseBtn.h){ goto(ST.PAUSE); Audio.tap(); buzz(8); return; }
    setPointer(e); return;
  }
  for(const b of BTNS){ if(e.clientX>=b.x&&e.clientX<=b.x+b.w&&e.clientY>=b.y&&e.clientY<=b.y+b.h){ Audio.tap(); buzz(8); b.action(); return; } }
});
cv.addEventListener('pointermove', e=>{ if(state===ST.PLAY) setPointer(e); });
cv.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

/* ===================== SPAWN ===================== */
function spawn(){ const f=fallers.spawn(); f.x=rand(40,W-40);f.y=-30;f.r=rand(16,22);f.t=0;f.spin=rand(0,6.28);f.dead=false;f.vx=0;
  const haz=clamp(0.20+difficulty*0.20,0.20,0.50), roll=Math.random();
  if(roll<0.05) f.kind='gold';
  else if(roll<0.05+haz){
    // tehlikelerin ÇOĞU artık VURULAMAZ "mayın" → mermi sekti, KAÇMAK şart
    f.kind = Math.random() < clamp(0.42+difficulty*0.28,0.42,0.72) ? 'mine' : 'hazard';
    if(f.kind==='mine' && !mineSeen){ mineSeen=true; popup(W/2,H*0.32,'VURULAMAZ — KAÇ!','255,180,110',true); }
  }
  else f.kind='orb';
  if(f.kind==='gold')f.r=20; f.vy=rand(180,230)+difficulty*150; }

/* ===================== UPDATE ===================== */
function update(dt){
  t+=dt; stateT+=dt; bgPulse+=dt; hue+=dt*8;
  if(state===ST.PAUSE){ Audio.tick(dt,0.08); return; }   // donmuş sahne
  zoom=lerp(zoom,zoomT,0.12); zoomT=lerp(zoomT,1,0.08);
  shake=Math.max(0,shake-shake*8*dt-0.1); flash=Math.max(0,flash-dt*2.2);
  particles.update((p,dt)=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.92;p.vy*=0.95;p.life-=dt;return p.life>0;},dt);
  popups.update((p,dt)=>{p.y+=p.vy*dt;p.vy*=0.9;p.life-=dt;return p.life>0;},dt);

  if(state===ST.SPLASH){ spark(); if(stateT>3.2) goto(ST.MENU); Audio.tick(dt,0); return; }
  if(state===ST.MENU||state===ST.SETTINGS||state===ST.OVER||state===ST.HOWTO){ spark(); Audio.tick(dt, state===ST.OVER?0.15:0.08); return; }

  // PLAY
  if(hitstop>0){ hitstop-=dt; Audio.tick(dt,0.25); return; }
  elapsed+=dt; if(levelUpT>0)levelUpT-=dt;
  difficulty=clamp(0.16*(level-1)+elapsed/120,0,1.8);     // her aşama belirgin hızlanma
  displayScore=lerp(displayScore,score,0.2);
  player.tx=pointerActive?pointerX:player.x;
  const dx=player.tx-player.x; player.x+=dx*Math.min(1,14*dt);
  const spd=Math.abs(dx);
  player.sx=lerp(player.sx,1+clamp(spd*0.004,0,0.35),0.2);
  player.sy=lerp(player.sy,1-clamp(spd*0.003,0,0.25),0.2);
  player.squash=lerp(player.squash,1,0.15);
  player.trail.unshift({x:player.x,y:player.y}); if(player.trail.length>14)player.trail.pop();
  spawnTimer-=dt; const interval=clamp(0.62-difficulty*0.34,0.24,0.62);
  if(spawnTimer<=0){ spawnTimer=interval*rand(0.7,1.15); spawn(); }
  // ZAMANLI BÜYÜK OLAYLAR
  evBig-=dt;   if(evBig<=0){   evBig=20;  spawnBoss(); }
  evMega-=dt;  if(evMega<=0){  evMega=100; spawnMega(); }
  evCross-=dt; if(evCross<=0){ evCross=60; startCrossfire(); }
  if(crossT>0){ crossT-=dt; crossSpawn-=dt; if(crossSpawn<=0){ crossSpawn=0.5; spawnCrossPair(); } }
  // TABANCA: namludan otomatik mermi akışı + mermi-tehlike çarpışması
  fireTimer-=dt; if(muzzle>0)muzzle=Math.max(0,muzzle-dt*6);
  if(fireTimer<=0){ fireTimer=FIRE_INTERVAL; fireBullet(); }
  bullets.update((b,dt)=>{
    b.y+=b.vy*dt; b.t+=dt;
    if(b.y<-24) return false;
    for(const f of fallers.list){ if(f.dead) continue;
      if(Math.hypot(f.x-b.x, f.y-b.y) < f.r+5){
        if(f.kind==='mine'||f.kind==='side'){ burst(b.x,b.y,'235,210,215',7,280,0.35); Audio.deflect(); return false; } // VURULAMAZ: sekti
        if(f.kind==='boss'){ f.hp-=weaponDmg(); burst(b.x,b.y,'255,180,180',6,300,0.3); Audio.hit2();
          if(f.hp<=0){ f.dead=true; score+=250; popup(f.x,f.y,'BOSS +250','255,170,170',true);
            burst(f.x,f.y,'255,80,90',64,900,1.0); Audio.record(); zoomPunch(1.3); shake=Math.max(shake,18); doFlash('255,90,110',0.6); buzz([30,50,30,50]); }
          return false; }
        if(f.kind==='mega'){ collectMega(f); f.dead=true; return false; }
        if(f.kind==='hazard') destroyHazard(f); else collectFaller(f);
        f.dead=true; return false;
      } }
    return true;
  },dt);
  const py=player.y, pr=player.r;
  fallers.update((f,dt)=>{
    if(f.dead) return false;
    f.t+=dt; f.y+=f.vy*dt; f.x+=(f.vx||0)*dt; f.spin+=dt*3;
    // yandan gelenler ortadaki boşlukta durur (orta = güvenli bölge)
    if(f.kind==='side' && ((f.vx>0&&f.x>=f.stopx)||(f.vx<0&&f.x<=f.stopx))) return false;
    const dist=Math.hypot(f.x-player.x, f.y-py);
    if(dist<f.r+pr*0.92){
      if(f.kind==='hazard'||f.kind==='mine'||f.kind==='boss'||f.kind==='side'){ gameOver(); return false; }
      if(f.kind==='mega'){ collectMega(f); return false; }
      collectFaller(f); player.squash=f.kind==='gold'?1.5:1.28; player.sx=1.4; player.sy=0.7;
      return false;
    }
    if(f.y>H+40){ if(f.kind==='orb'){ if(combo>1){Audio.miss();popup(f.x,H-60,'kombo!','120,130,160',false);} combo=1; } return false; }
    return true;
  },dt);
  if(score>=levelBase+levelGoal) levelUp();               // aşama hedefi doldu → STAGE +1
  Audio.tick(dt, clamp(0.2+difficulty*0.5+Math.min(0.4,combo*0.02),0,1));
}

  // toggle pill
  const pw=58,ph=30,px=x+w-pw-22,py=cy-ph/2; ctx.shadowColor=val?'rgba(120,255,180,.8)':'transparent'; ctx.shadowBlur=val?12:0;
  rr(px,py,pw,ph,ph/2); ctx.fillStyle=val?hsl(150,80,45):'rgba(70,80,110,.8)'; ctx.fill(); ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(val?px+pw-ph/2:px+ph/2, cy, ph/2-4, 0,7); ctx.fillStyle='#fff'; ctx.fill();
  ctx.restore(); BTNS.push({x,y,w,h,action}); }

function render(){
  ctx.setTransform(DPR,0,0,DPR,0,0); BTNS=[]; bg();
  ctx.save();
  const sx=(Math.random()*2-1)*shake, sy=(Math.random()*2-1)*shake;
  ctx.translate(W/2,H/2);ctx.scale(zoom,zoom);ctx.translate(-W/2+sx,-H/2+sy);
  drawParticles();
  if(state===ST.PLAY||state===ST.PAUSE){ fallers.each(drawFaller); drawBullets(); drawPlayer(); drawPopups(); }
  ctx.restore();

  if(state===ST.SPLASH){
    const a1=easeOut(clamp(stateT/0.7,0,1)), a2=easeOut(clamp((stateT-0.7)/0.7,0,1));
    const out=clamp((stateT-2.6)/0.6,0,1); const fade=1-out;
    ctx.globalAlpha=fade;
    center('FLORENTIA', H*0.44, Math.min(64,W*0.13)*(0.9+0.1*a1), hsl(190,90,65), 30, a1);
    // alt çizgi
    if(a1>0.5){ const lw=Math.min(260,W*0.55)*easeOut(clamp((stateT-0.5)/0.6,0,1));
      ctx.save();ctx.globalAlpha=fade;ctx.strokeStyle=hsl(320,90,68,.9);ctx.lineWidth=3;ctx.shadowColor=hsl(320,90,68,.8);ctx.shadowBlur=14;
      ctx.beginPath();ctx.moveTo(W/2-lw/2,H*0.49);ctx.lineTo(W/2+lw/2,H*0.49);ctx.stroke();ctx.restore(); }
    center('— GAMES —', H*0.55, 18, 'rgba(180,200,240,.9)', 8, a2);
    ctx.globalAlpha=1;
    center('dokun ▶ atla', H*0.92, 14, 'rgba(150,170,210,.5)', 4, a2);
  }
  if(state===ST.MENU){
    const ap=easeOutBack(clamp(stateT/0.5,0,1));
    ctx.save();ctx.translate(W/2,H*0.3);ctx.scale(ap,ap);ctx.translate(-W/2,-H*0.3);
    center('NEON', H*0.26, Math.min(92,W*0.21), hsl(190,90,65),28);
    center('CATCH', H*0.26+Math.min(92,W*0.21)*0.92, Math.min(92,W*0.21), hsl(320,90,68),28);
    ctx.restore();
    center('BY FLORENTIA', H*0.43, 16, 'rgba(180,200,240,.85)', 8);
    button('▶  OYNA', H*0.58, Math.min(300,W*0.7), 64, ()=>{ if(localStorage.getItem('nc_guide')) startGame(); else { howtoThenPlay=true; goto(ST.HOWTO); } }, 160);
    button('⚙  AYARLAR', H*0.69, Math.min(300,W*0.7), 56, ()=>goto(ST.SETTINGS), 280);
    if(best>0) center('rekor '+best+'  ·  aşama '+bestStage+'  ·  kombo x'+bestC, H*0.8, 15,'rgba(150,170,210,.8)',6);
  }
  if(state===ST.SETTINGS){
    center('AYARLAR', H*0.22, Math.min(46,W*0.11), '#fff', 14);
    toggleRow('🎵  Müzik', Settings.music, H*0.4, ()=>{Settings.music=!Settings.music;Audio.setMusic(Settings.music);saveSettings();});
    toggleRow('🔊  Efektler', Settings.sfx, H*0.4+86, ()=>{Settings.sfx=!Settings.sfx;Audio.setSfx(Settings.sfx);saveSettings();});
    toggleRow('📳  Titreşim', Settings.haptics, H*0.4+172, ()=>{Settings.haptics=!Settings.haptics;saveSettings();buzz(20);});
    center('titreşim sadece Android · iPhone desteklemiyor', H*0.4+230, 12,'rgba(140,160,200,.7)',4);
    button('❔  NASIL OYNANIR', H*0.72, Math.min(300,W*0.72), 54, ()=>{ howtoThenPlay=false; goto(ST.HOWTO); }, 190);
    button('←  GERİ', H*0.84, Math.min(220,W*0.6), 52, ()=>goto(ST.MENU), 200);
  }
  if(state===ST.HOWTO) renderHowto();
  if(state===ST.PLAY||state===ST.PAUSE){
    ctx.save();ctx.textAlign='left';ctx.font="900 54px 'Trebuchet MS'";ctx.fillStyle='#fff';
    ctx.shadowColor=hsl(hue%360,90,60,.8);ctx.shadowBlur=12;ctx.fillText(Math.floor(displayScore),22,66);
    if(combo>1){const ps=1+0.06*Math.sin(t*16);ctx.font=`900 ${30*ps}px 'Trebuchet MS'`;
      ctx.fillStyle=hsl((hue+40)%360,90,65);ctx.shadowColor=hsl((hue+40)%360,90,60,.9);ctx.shadowBlur=16;ctx.fillText('x'+combo,24,104);}
    ctx.restore();
    ctx.save(); ctx.textAlign='left'; ctx.font="700 16px 'Trebuchet MS'"; ctx.fillStyle='rgba(150,255,210,.95)';
    ctx.shadowColor='rgba(120,255,200,.55)'; ctx.shadowBlur=6; ctx.fillText('GÜÇ '+weaponDmg(), 24, 132); ctx.restore();
    // AŞAMA göstergesi (üst orta) + ilerleme çubuğu
    const prog=clamp((score-levelBase)/levelGoal,0,1);
    const bw=Math.min(210,W*0.46), bx=W/2-bw/2, by=46;
    ctx.save(); ctx.textAlign='center';
    ctx.font="900 17px 'Trebuchet MS'"; ctx.fillStyle='#dce8ff'; ctx.shadowColor='rgba(160,190,255,.7)'; ctx.shadowBlur=8;
    ctx.fillText('AŞAMA '+level, W/2, by-7); ctx.shadowBlur=0;
    rr(bx,by,bw,7,4); ctx.fillStyle='rgba(40,50,90,.75)'; ctx.fill();
    rr(bx,by,Math.max(7,bw*prog),7,4); ctx.fillStyle=hsl(280,90,66); ctx.shadowColor='rgba(190,140,255,.8)'; ctx.shadowBlur=8; ctx.fill();
    ctx.restore();
    if(state===ST.PLAY) drawPauseBtn();
  }
  // AŞAMA geçiş kutlaması (büyük banner)
  if(levelUpT>0 && (state===ST.PLAY||state===ST.PAUSE)){
    const a=clamp(levelUpT/1.5,0,1), pop=easeOutBack(clamp((1.5-levelUpT)/0.3,0,1));
    center('AŞAMA '+level, H*0.40, Math.min(72,W*0.17)*pop, hsl(280,90,70), 28, a);
    center('hız artıyor!', H*0.40+46, 19, 'rgba(205,175,255,.95)', 10, a);
  }
  if(state===ST.PAUSE){
    ctx.fillStyle='rgba(5,6,15,0.62)'; ctx.fillRect(0,0,W,H);
    center('⏸  DURAKLATILDI', H*0.17, Math.min(34,W*0.085),'#fff',14);
    button('▶  DEVAM', H*0.29, Math.min(280,W*0.7), 62, ()=>goto(ST.PLAY), 160);
    toggleRow('🎵  Müzik', Settings.music, H*0.44, ()=>{Settings.music=!Settings.music;Audio.setMusic(Settings.music);saveSettings();});
    toggleRow('🔊  Efektler', Settings.sfx, H*0.44+78, ()=>{Settings.sfx=!Settings.sfx;Audio.setSfx(Settings.sfx);saveSettings();});
    toggleRow('📳  Titreşim', Settings.haptics, H*0.44+156, ()=>{Settings.haptics=!Settings.haptics;saveSettings();buzz(20);});
    button('⟳  YENİDEN', H*0.75, Math.min(260,W*0.64), 54, startGame, 280);
    button('☰  MENÜ', H*0.85, Math.min(260,W*0.64), 50, ()=>goto(ST.MENU), 200);
  }
  if(state===ST.OVER){
    ctx.fillStyle='rgba(5,6,15,0.55)';ctx.fillRect(0,0,W,H);
    const ap=easeOut(clamp(stateT/0.5,0,1));
    if(newRecord) center('🏆 YENİ REKOR!', H*0.24, Math.min(44,W*0.11), hsl((t*120)%360,90,65),24,ap);
    else center('BİTTİ', H*0.25, Math.min(56,W*0.14),'#fff',16,ap);
    center('SKOR', H*0.37, 18,'rgba(160,180,220,.8)',6,ap);
    center(score, H*0.44, Math.min(64,W*0.16), hsl(190,90,65),20,ap);
    center('aşama '+level+'  ·  en yüksek kombo x'+bestCombo, H*0.52, 19,'rgba(200,180,255,.95)',8,ap);
    center('en iyi aşama '+bestStage+'   ·   rekor '+best, H*0.575, 16,'rgba(150,170,210,.85)',6,ap);
    if(stateT>0.4){ button('▶  TEKRAR', H*0.72, Math.min(280,W*0.66), 60, startGame, 160);
      button('☰  MENÜ', H*0.83, Math.min(280,W*0.66), 52, ()=>goto(ST.MENU), 280); }
  }

  if(flash>0){ ctx.fillStyle=`rgba(${flashColor},${flash})`; ctx.fillRect(0,0,W,H); }
}

let last=performance.now();
function loop(now){ let dt=(now-last)/1000; last=now; dt=Math.min(dt,0.05); update(dt); render(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
</body>
</html>
