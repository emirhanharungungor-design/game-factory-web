   Reskin, baştaki HTML işaretçisi yerine window.GAME_CONFIG yazar. Yoksa varsayılan NEON CATCH. */

const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W=0, H=0, DPR=1;
function resize(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px';

const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const easeOut=t=>1-Math.pow(1-t,3);
const easeOutBack=t=>{const c=2.70158;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2);};
const easeInOut=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
function hsl(h,s,l,a=1){return `hsla(${h},${s}%,${l}%,${a})`;}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

/* ===================== AYARLAR ===================== */
const Settings = {
  music: localStorage.getItem('nc_music')!=='0',
  sfx:   localStorage.getItem('nc_sfx')!=='0',
  haptics: localStorage.getItem('nc_haptics')!=='0',
};
function saveSettings(){
  localStorage.setItem('nc_music',Settings.music?'1':'0');
  localStorage.setItem('nc_sfx',Settings.sfx?'1':'0');
  localStorage.setItem('nc_haptics',Settings.haptics?'1':'0');
}
function buzz(p){ if(Settings.haptics && navigator.vibrate) navigator.vibrate(p); }

/* ===================== SES ===================== */
const Audio = (()=>{
  let ctxA=null, master=null, musicGain=null, sfxOn=Settings.sfx, musicOn=Settings.music;
  let beat=0, beatTimer=0, intensity=0;
  function ensure(){
    if(ctxA) return;
    ctxA = new (window.AudioContext||window.webkitAudioContext)();
    master = ctxA.createGain(); master.gain.value=0.9; master.connect(ctxA.destination);
    musicGain = ctxA.createGain(); musicGain.gain.value=0.0; musicGain.connect(master);
  }
  function resume(){ ensure(); if(ctxA.state==='suspended') ctxA.resume(); }
  function tone(freq,dur,type,vol,sweep,dest){
    if(!ctxA) return;
    const o=ctxA.createOscillator(), g=ctxA.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,ctxA.currentTime);
    if(sweep) o.frequency.exponentialRampToValueAtTime(Math.max(40,freq+sweep),ctxA.currentTime+dur);
    g.gain.setValueAtTime(0.0001,ctxA.currentTime);
    g.gain.exponentialRampToValueAtTime(vol,ctxA.currentTime+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,ctxA.currentTime+dur);
    o.connect(g); g.connect(dest||master); o.start(); o.stop(ctxA.currentTime+dur+0.02);
  }
  function noise(dur,vol,dest,hp){
    if(!ctxA) return;
    const n=ctxA.createBufferSource(), buf=ctxA.createBuffer(1,ctxA.sampleRate*dur,ctxA.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    n.buffer=buf; const g=ctxA.createGain(); g.gain.value=vol;
    const f=ctxA.createBiquadFilter(); f.type=hp?'highpass':'lowpass'; f.frequency.value=hp||900;
    n.connect(f); f.connect(g); g.connect(dest||master); n.start();
  }
  const PENT=[0,3,5,7,10];
  function collect(combo){ if(!sfxOn)return; const step=PENT[combo%PENT.length];
    const base=520*Math.pow(2,(step+Math.min(24,combo))/12);
    tone(base,0.16,'triangle',0.26,base*0.5); tone(base*1.5,0.1,'sine',0.1); }
  function gold(){ if(!sfxOn)return; [0,4,7,12].forEach((s,i)=>setTimeout(()=>tone(660*Math.pow(2,s/12),0.18,'triangle',0.3,200),i*55)); }
  function miss(){ if(!sfxOn)return; tone(220,0.18,'sawtooth',0.16,-120); }
  function hit(){ if(!sfxOn)return; noise(0.4,0.5); tone(110,0.5,'sawtooth',0.32,-70); }
  function milestone(){ if(!sfxOn)return; [0,7,12,16].forEach((s,i)=>setTimeout(()=>tone(440*Math.pow(2,s/12),0.22,'square',0.2,80),i*70)); }
  function record(){ if(!sfxOn)return; [0,4,7,12,16,19].forEach((s,i)=>setTimeout(()=>tone(523*Math.pow(2,s/12),0.3,'triangle',0.26,120),i*90)); }
  function tap(){ if(!sfxOn)return; tone(820,0.05,'square',0.12); }
  function whoosh(){ if(!sfxOn)return; noise(0.35,0.18,null,400); }
  function shoot(){ if(!sfxOn)return; tone(1500+Math.random()*260,0.045,'square',0.045,-760); }   // ufak "pew"
  function hit2(){ if(!sfxOn)return; noise(0.14,0.34); tone(190,0.16,'sawtooth',0.2,-90); }          // tehlike patladı
  function deflect(){ if(!sfxOn)return; tone(2600,0.04,'square',0.05,-500); noise(0.05,0.09,null,5200); } // mermi mayından sekti
  function kick(){ if(!ctxA||!musicOn)return; const o=ctxA.createOscillator(),g=ctxA.createGain();
    o.type='sine'; o.frequency.setValueAtTime(150,ctxA.currentTime); o.frequency.exponentialRampToValueAtTime(46,ctxA.currentTime+0.11);
    g.gain.setValueAtTime(0.55,ctxA.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctxA.currentTime+0.16);
    o.connect(g); g.connect(musicGain); o.start(); o.stop(ctxA.currentTime+0.18); }
  // I–V–vi–IV (öforik pop) — kök/3lü/5li yarım-ton ofsetleri (C tabanlı)
  const C_ROOT=[0,7,9,5], C_3=[4,11,12,9], C_5=[7,14,16,12], BASS=65.41, ARP=523.25;
  function tick(dt, inten){
    if(!ctxA) return;
    intensity = lerp(intensity, inten, 0.05);
    const target = musicOn? (0.11+intensity*0.13):0;
    musicGain.gain.setTargetAtTime(target, ctxA.currentTime, 0.3);
    if(!musicOn) return;
    const bpm=122+intensity*34, spb=60/bpm/4; beatTimer+=dt;     // onaltılık adım
    if(beatTimer>=spb){ beatTimer-=spb; beat=(beat+1)%16;
      const ch=(beat>>2)&3, root=C_ROOT[ch];
      if((beat&3)===0){ kick(); tone(BASS*Math.pow(2,root/12),0.2,'sawtooth',0.2,0,musicGain); }  // four-on-floor + bas
      noise(0.022,((beat&1)?0.07:0.035)+intensity*0.04,musicGain,8000);                           // hi-hat
      if(intensity>0.1){                                                                            // PARLAK ARPEJ (dopamin)
        const steps=[0,C_3[ch]-root,C_5[ch]-root,12], semi=root+steps[beat&3];
        tone(ARP*Math.pow(2,semi/12),0.14,'triangle',0.06+intensity*0.09,0,musicGain);
        if(intensity>0.45) tone(ARP*2*Math.pow(2,semi/12),0.07,'square',0.025+intensity*0.03,0,musicGain);
      }
      if(intensity>0.7 && (beat&7)===6) tone(ARP*Math.pow(2,(root+7)/12),0.1,'sawtooth',0.05,0,musicGain); // enerji stab
    }
  }
  function setSfx(b){ sfxOn=b; }
  function setMusic(b){ musicOn=b; if(ctxA&&musicGain&&!b) musicGain.gain.setTargetAtTime(0,ctxA.currentTime,0.15); }
  return {resume,collect,gold,miss,hit,milestone,record,tap,whoosh,tick,setSfx,setMusic,shoot,hit2,deflect};
})();

/* ===================== HAVUZLAR ===================== */
function Pool(make){ const free=[],used=[];
  return { spawn(){const o=free.pop()||make();used.push(o);return o;},
    update(fn,dt){for(let i=used.length-1;i>=0;i--){if(fn(used[i],dt)===false){free.push(used[i]);used.splice(i,1);}}},
    each(fn){for(const o of used)fn(o);}, get list(){return used;}, clear(){while(used.length)free.push(used.pop());} };
}
const particles=Pool(()=>({})), fallers=Pool(()=>({})), popups=Pool(()=>({})), bullets=Pool(()=>({}));
function burst(x,y,color,n,spd,life=0.6){ for(let i=0;i<n;i++){const p=particles.spawn(),a=rand(0,6.28),s=rand(spd*0.3,spd);
  p.x=x;p.y=y;p.vx=Math.cos(a)*s;p.vy=Math.sin(a)*s;p.life=p.max=rand(life*0.5,life);p.r=rand(2,5);p.color=color;} }
function popup(x,y,txt,color,big){ const p=popups.spawn();p.x=x;p.y=y;p.txt=txt;p.color=color;p.life=p.max=big?1.1:0.85;p.big=!!big;p.vy=big?-70:-90;return p; }
function spark(){ // arka plan yıldız tozu (menü/splash)
  if(Math.random()<0.4){const p=particles.spawn();p.x=rand(0,W);p.y=H+10;p.vx=rand(-10,10);p.vy=rand(-40,-90);
    p.life=p.max=rand(1.5,3);p.r=rand(1,2.5);p.color=`${rand(150,330)|0},90,200`;}
}

/* ===================== DURUM ===================== */
const ST={SPLASH:0,MENU:1,SETTINGS:2,PLAY:3,OVER:4,PAUSE:5,HOWTO:6,REVIVE:7,STORE:8,DAILY:9,CASE:10,SKINS:11,POWERS:12,LEADER:13,LOGIN:14};
let gems=+localStorage.getItem('nc_gems')||0;             // mağaza para birimi (gerçek parayla/promo/reklamla alınır)
function saveGems(){ localStorage.setItem('nc_gems',gems); }
function addGems(n){ gems+=n; saveGems(); }
function addHearts(n){ lives=clamp((loadLives())+n,0,5); localStorage.setItem('nc_lives',lives); }
let storeMsg='', storeMsgT=0, reveal=null;
/* ELMAS PAKETLERİ — 500 elmas = ₺49,99 baz; büyük paket daha avantajlı */
const GEMPACKS=[ {id:'p1',gems:100,price:'₺11,99'}, {id:'p2',gems:500,price:'₺49,99'}, {id:'p3',gems:1200,price:'₺99,99',bonus:'+%20'}, {id:'p4',gems:3000,price:'₺199,99',bonus:'+%50'} ];
function toast(m){ storeMsg=m; storeMsgT=2.4; }
/* PROMO KODLAR — buradan ekle/değiştir. Her kod oyuncu başına 1 kez. */
const PROMO={ 'FLORENTIA':{gems:100,msg:'+100 💎'}, 'FIRST':{hearts:2,msg:'+2 ❤️'}, 'SONIC':{gems:50,boost:1,msg:'+50 💎 + güç paketi'} };
function redeemPromo(){
  let c=(prompt('Promo kodu gir:')||'').trim().toUpperCase(); if(!c) return;
  const used=JSON.parse(localStorage.getItem('nc_promo')||'[]');
  if(used.includes(c)){ toast('Bu kod zaten kullanıldı'); return; }
  const p=PROMO[c]; if(!p){ toast('Geçersiz kod'); return; }
  if(p.gems)addGems(p.gems); if(p.hearts)addHearts(p.hearts); if(p.boost)localStorage.setItem('nc_boost','1');
  used.push(c); localStorage.setItem('nc_promo',JSON.stringify(used)); Audio.record(); toast('KOD: '+(p.msg||'ödül verildi'));
}
/* NATIVE kancalar (Android sarmalayıcı Play Billing/AdMob ile doldurur). Web'de test: doğrudan verir. */
function buyGems(p){   // p: GEMPACKS öğesi. Gerçek tahsilat native (Play Billing); web'de test verir.
  if(window.Android&&Android.purchase){ try{ Android.purchase('gems_'+p.id); }catch(e){} return; }
  addGems(p.gems); Audio.gold(); toast('+'+p.gems+' 💎 ('+p.price+' — web test)'); }

/* REKLAM KALDIRMA — tek seferlik gerçek-para satın alma (99,99 TL). Reklam SADECE ölünce çıkar. */
let noAds=localStorage.getItem('nc_noads')==='1';
function grantNoAds(){ noAds=true; localStorage.setItem('nc_noads','1'); }
window.grantNoAds=grantNoAds;   // native satın alma başarılı olunca çağırır
function buyNoAds(){ if(noAds){ toast('Reklamsız zaten aktif ✓'); return; }
  if(window.Android&&Android.purchase){ try{ Android.purchase('noads'); }catch(e){} return; }
  grantNoAds(); Audio.gold&&Audio.gold(); toast('Reklamlar kaldırıldı (web test) ✓'); }
try{ if(window.Android&&Android.hasNoAds&&Android.hasNoAds()){ grantNoAds(); } }catch(e){}   // cihazda zaten alınmışsa geri yükle
window.grantGems=function(n){ n=+n||0; if(n>0){ addGems(n); Audio.gold&&Audio.gold(); toast('+'+n+' 💎 ✓'); } };   // Play Billing gems satın alma başarılı
window.rewardGems=function(n){ n=+n||25; addGems(n); Audio.gold&&Audio.gold(); toast('+'+n+' 💎 (reklam)'); };   // ödüllü reklam izlendi
function showDeathAd(){ if(noAds) return; if(window.Android&&Android.gameOver){ try{ Android.gameOver(); }catch(e){} } }   // ÖLÜNCE geçiş reklamı (reklamsızda gösterme)
/* SÜRPRİZ SANDIKLAR — ekonomi-güvenli: beklenen değer ≈ maliyetin biraz altı, küçük jackpot şansı */
const CHESTS={
  mini:{cost:30,name:'Mini Sandık',rewards:[[50,'gems',[15,28]],[22,'gems',[30,30]],[11,'hearts',1],[10,'power',1],[5,'skin','common'],[2,'gems',[120,120]]]},
  super:{cost:80,name:'Sürpriz Sandık',rewards:[[42,'gems',[45,75]],[20,'gems',[85,85]],[14,'hearts',1],[14,'power',1],[7,'skin','rare'],[3,'gems',[300,300]]]},
  efsane:{cost:200,name:'Efsane Sandık',rewards:[[38,'gems',[130,190]],[20,'hearts',2],[20,'power',2],[10,'skin','epic'],[8,'gems',[260,260]],[4,'gems',[700,700]]]},
};
function openChest(key){ const c=CHESTS[key];
  if((chestInv[key]||0)>0){ addChest(key,-1); }      // önce sahip olunan sandığı aç (bedava)
  else if(gems>=c.cost){ addGems(-c.cost); }
  else { toast('Yetersiz 💎 — '+c.cost); return; }
  let r=Math.random()*100, pick=c.rewards[c.rewards.length-1]; for(const rw of c.rewards){ r-=rw[0]; if(r<=0){ pick=rw; break; } }
  const [,kind,val]=pick; let rev;
  if(kind==='gems'){ const g=Array.isArray(val)?Math.round(rand(val[0],val[1])):val; addGems(g); rev={icon:'💎',col:'120,240,255',title:'ELMAS',amt:'+'+g}; }
  else if(kind==='hearts'){ addHearts(val); rev={icon:'❤️',col:'255,90,110',title:'KALP',amt:'+'+val}; }
  else if(kind==='skin'){ rev=grantSkin(pickSkinOfRarity(val)); }
  else { const pk=POWER_KEYS[Math.floor(Math.random()*POWER_KEYS.length)]; addPower(pk,val); const P=POWERS[pk]; rev={pkey:pk,col:P.col,title:P.name,amt:'+'+val}; }
  Audio.record(); zoomPunch(1.18); reveal=Object.assign({name:c.name,t:0},rev);   // kart-reveal: güç/skin/elmas kartı
}
let howtoThenPlay=false;   // kılavuzdan sonra oyuna mı başlanacak (ilk oynayış)
let howPage=0;             // nasıl oynanır: 0=oynanış, 1=güçler & mağaza
let dailySeen=false;       // bu oturumda günlük ekranı bir kez otomatik gösterildi mi
function enterHub(){ if(!account){ goto(ST.LOGIN); return; }   // ilk açılış: giriş/kayıt
  if(!dailySeen){ dailySeen=true; if(typeof canClaimDaily==='function' && canClaimDaily()){ goto(ST.DAILY); return; } } goto(ST.MENU); }
/* Kaydırılabilir liste (skin ızgarası gibi) — sürükle/tekerlek ile kaydır, tap pointerup'ta. */
let viewScroll=0, viewScrollMax=0, dragY=null, dragScroll0=0, dragDist=0;
function SCROLLABLE(){ return state===ST.SKINS||state===ST.LEADER; }
const LIFE_MS=30*60*1000;  // her can GERÇEK ZAMANDA yarım saatte 1 dolar
let lives=3, reviveT=0, invuln=0, safeT=0;                 // can / revive geri sayım / dokunulmazlık / güvenli pencere
let pwShield=0, pwFire=0;   // SADECE aktif etki süreleri (BEKLEME SÜRESİ YOK)
let sonicT=0, timeScale=1;  // SÜPER SONIC aktif süresi
let fb=null;                // ATEŞ TOPU mermisi (orta kolon yakar, yanlar boş)
let powerBtns=[];           // alttaki süper güç butonları (dokunma testi)
/* SÜPER GÜÇLER artık TÜKENEN ENVANTER — cooldown yok. Günlük giriş / sandık / mağaza / kasadan kazanılır,
   oyuncu stoğu bitene kadar istediği kadar kullanır. Her gücün kendi kartı vardır. */
const POWERS={
  shield:  {name:'KALKAN',       col:'120,200,255', desc:'4 sn dokunulmazlık kalkanı'},
  sonic:   {name:'SÜPER SONİC',  col:'255,224,120', desc:'10 sn tüm oyun hızlanır'},
  fireball:{name:'ATEŞ TOPU',    col:'255,150,60',  desc:'İleri giden alev kolonu'},
  boom:    {name:'BOMBA',        col:'255,185,95',  desc:'Ekrandaki tüm tehlikeleri yok eder'},
  fire:    {name:'SÜPER ATEŞ',   col:'150,255,210', desc:'5 sn 3 yönlü + 2× hasarlı atış'},
};
const POWER_KEYS=['shield','sonic','fireball','boom','fire'];
let pwInv=JSON.parse(localStorage.getItem('nc_pw')||'null');
if(!pwInv){ pwInv={shield:3,sonic:2,fireball:3,boom:2,fire:3}; localStorage.setItem('nc_pw',JSON.stringify(pwInv)); }  // başlangıç stoğu
function pwCount(k){ return pwInv[k]||0; }
function addPower(k,n){ pwInv[k]=Math.max(0,(pwInv[k]||0)+n); localStorage.setItem('nc_pw',JSON.stringify(pwInv)); }
/* DİREKT SATIN ALMA — bilerek premium fiyat (sandık/kasa/günlük yolundan daha pahalı). */
const POWER_PRICE={ shield:500, fire:550, boom:600, sonic:700, fireball:750 };   // bilerek pahalı (normalin ~10 katı)
function buyPower(k){ const p=POWER_PRICE[k]; if(gems<p){ toast('Yetersiz 💎 ('+p+')'); return; } addGems(-p); addPower(k,1); Audio.gold(); toast(POWERS[k].name+' +1  ·  stok '+pwCount(k)); }
function usePower(k){ if(state!==ST.PLAY) return;
  if(pwCount(k)<=0){ doFlash('255,90,90',0.22); shake=Math.max(shake,6); popup(W/2,H-92,POWERS[k].name+' yok — mağaza','255,120,120',false); buzz([30,40,30]); return; }
  addPower(k,-1); activatePower(k); }
function activatePower(k){
  if(k==='shield'){ pwShield=4; invuln=Math.max(invuln,4); doFlash('120,200,255',0.3); Audio.milestone(); buzz(20); }
  else if(k==='sonic'){ sonicT=10; doFlash('255,224,120',0.4); Audio.gold(); zoomPunch(1.18); shake=Math.max(shake,10); popup(W/2,H*0.4,'⚡ SÜPER SONIC!','255,224,120',true); buzz([20,30,20]); }
  else if(k==='fireball'){ fireball(); }
  else if(k==='boom'){ destroyer(); }
  else if(k==='fire'){ pwFire=5; doFlash('150,255,210',0.3); Audio.gold(); buzz(20); }
}

/* ===================== KARAKTER SKİNLERİ ===================== */
const RARITY={ common:'150,160,190', rare:'90,180,255', epic:'200,110,255', mythic:'255,205,60', legendary:'255,140,40' };
const RNAME={ common:'Sıradan', rare:'Nadir', epic:'Epik', mythic:'Efsanevi', legendary:'Söylencesel' };
const SKINS={
  default:{name:'Klasik',     rarity:'common', cost:0},
  cowboy: {name:'Kovboy',     rarity:'rare',   cost:450},
  suit:   {name:'Takım Elbise',rarity:'rare',  cost:550},
  clown:  {name:'Palyaço',    rarity:'rare',   cost:600},
  camo:   {name:'Kamuflaj',   rarity:'epic',   cost:900},

  const L=fallers.spawn(); L.kind='side'; L.x=-34; L.y=y; L.r=18; L.t=0; L.spin=rand(0,6.28); L.dead=false; L.vy=0; L.vx=spd;  L.stopx=W*0.5-56;
  const R=fallers.spawn(); R.kind='side'; R.x=W+34; R.y=y; R.r=18; R.t=0; R.spin=rand(0,6.28); R.dead=false; R.vy=0; R.vx=-spd; R.stopx=W*0.5+56;
}
function collectMega(f){   // yeşil mega bonus toplandı (mermi ya da dokunuş)
  score+=1000; combo+=2; bestCombo=Math.max(bestCombo,combo);
  popup(f.x,f.y-10,'+1000','120,255,150',true); burst(f.x,f.y,'120,255,150',54,820,1.0); burst(f.x,f.y,'255,255,255',20,500,0.7);
  Audio.record(); zoomPunch(1.26); shake=Math.max(shake,14); doFlash('120,255,150',0.5); buzz([20,40,20,40]);
}
/* ---- CAN sistemi (3 kalp, gerçek zamanda yarım saatte 1 dolum) ---- */
function loadLives(){
  let n=parseInt(localStorage.getItem('nc_lives')); if(isNaN(n))n=3;
  let ts=parseInt(localStorage.getItem('nc_lifeTs'))||Date.now();
  if(n<3){ const reg=Math.floor((Date.now()-ts)/LIFE_MS);
    if(reg>0){ n=Math.min(3,n+reg); ts+=reg*LIFE_MS; if(n>=3)ts=Date.now(); } }
  else ts=Date.now();
  localStorage.setItem('nc_lives',n); localStorage.setItem('nc_lifeTs',ts); return n;
}
function spendLife(){ if(lives>=3) localStorage.setItem('nc_lifeTs',Date.now()); lives=Math.max(0,lives-1); localStorage.setItem('nc_lives',lives); }
function nextLifeMs(){ if(lives>=3)return 0; const ts=parseInt(localStorage.getItem('nc_lifeTs'))||Date.now(); return Math.max(0,LIFE_MS-(Date.now()-ts)); }
/* ---- ölüm → revive teklifi (10 sn) ---- */
function die(){
  Audio.hit(); shake=Math.max(shake,28); doFlash('255,60,90',0.8); hitstop=0.12;
  burst(player.x,player.y,'255,70,110',40,900,0.9); buzz([40,30,80]);
  lives=loadLives();
  if(lives>0){ reviveT=10; goto(ST.REVIVE); } else gameOver();
}
function revive(){
  spendLife(); invuln=3.6; safeT=2.6;                   // uzun dokunulmazlık + 2.6sn yeni tehlike YOK (kaçacak yer kalsın)
  fallers.each(f=>{ f.dead=true; }); bullets.clear();   // ekranı temizle, oradan devam
  player.x=player.tx=pointerX=W/2;                       // oyuncuyu ortaya al (güvenli)
  doFlash(GAME.player,0.5); Audio.milestone(); zoomPunch(1.15); buzz([15,25,15]);
  goto(ST.PLAY);
}
/* ---- SÜPER GÜÇ: Yok Edici (ekranı sil + tüm puanları topla) ---- */
function destroyer(){
  doFlash('255,255,255',0.95); shake=Math.max(shake,28); zoomPunch(1.32); Audio.record(); buzz([40,60,40,60]); hitstop=0.1;
  let gained=0;
  fallers.each(f=>{ if(f.dead)return;
    gained += f.kind==='mega'?1000 : f.kind==='gold'?50 : f.kind==='orb'?10 : 20;
    burst(f.x,f.y,'255,240,180',12,620,0.6); f.dead=true; });
  if(gained>0){ score+=gained; combo++; bestCombo=Math.max(bestCombo,combo); popup(W/2,H*0.4,'YOK ETTİN +'+gained,'255,240,160',true); }
}
/* ATEŞ TOPU — oyuncudan yukarı giden alev mermisi; ORTA kolonu yakar (yanlar boş),
   vurulamazlar dahil. Büyük titreşim + ekran sarsıntısı + yazı. */

/* ===================== INPUT + BUTONLAR ===================== */
let BTNS=[]; let pauseBtn={x:1e9,y:1e9,w:0,h:0};
function setPointer(e){ pointerX=clamp(e.clientX,0,W); pointerActive=true; }
cv.addEventListener('pointerdown', e=>{
  Audio.resume();
  if(state===ST.SPLASH){ enterHub(); Audio.whoosh(); return; }
  if(state===ST.PLAY){
    if(e.clientX>=pauseBtn.x&&e.clientX<=pauseBtn.x+pauseBtn.w&&e.clientY>=pauseBtn.y&&e.clientY<=pauseBtn.y+pauseBtn.h){ goto(ST.PAUSE); Audio.tap(); buzz(8); return; }
    for(const p of powerBtns){ if(Math.hypot(e.clientX-p.x,e.clientY-p.y)<p.r){ p.action(); return; } }
    setPointer(e); return;
  }
  if(SCROLLABLE()){ dragY=e.clientY; dragScroll0=viewScroll; dragDist=0; return; }   // kaydırılabilir ekran: tap/scroll ayrımı pointerup'ta
  if(reveal && reveal.t>0.35){ reveal=null; Audio.tap(); buzz(6); return; }   // kart-reveal'i kapat
  for(const b of BTNS){ if(e.clientX>=b.x&&e.clientX<=b.x+b.w&&e.clientY>=b.y&&e.clientY<=b.y+b.h){ Audio.tap(); buzz(8); b.action(); return; } }
});
cv.addEventListener('pointermove', e=>{ if(state===ST.PLAY){ setPointer(e); return; }
  if(SCROLLABLE() && dragY!==null){ const dy=e.clientY-dragY; dragDist=Math.max(dragDist,Math.abs(dy)); viewScroll=clamp(dragScroll0-dy,0,viewScrollMax); } });
cv.addEventListener('pointerup', e=>{ if(SCROLLABLE() && dragY!==null){ const wasDrag=dragDist>8; dragY=null; if(wasDrag) return;
  for(const b of BTNS){ if(e.clientX>=b.x&&e.clientX<=b.x+b.w&&e.clientY>=b.y&&e.clientY<=b.y+b.h){ Audio.tap(); buzz(8); b.action(); return; } } } });
cv.addEventListener('wheel', e=>{ if(SCROLLABLE()){ viewScroll=clamp(viewScroll+e.deltaY,0,viewScrollMax); } }, {passive:true});
cv.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

/* ===================== SPAWN ===================== */
function spawn(){ const f=fallers.spawn(); f.x=rand(40,W-40);f.y=-30;f.r=rand(16,22);f.t=0;f.spin=rand(0,6.28);f.dead=false;f.vx=0;
  const haz=clamp(0.20+difficulty*0.20,0.20,0.50), roll=Math.random();
  if(roll<0.05) f.kind='gold';
  else if(roll<0.05+haz){
    // tehlikelerin ÇOĞU artık VURULAMAZ "mayın" → mermi sekti, KAÇMAK şart
    f.kind = Math.random() < clamp(0.42+difficulty*0.28,0.42,0.72) ? 'mine' : 'hazard';
    if(f.kind==='mine' && !mineSeen){ mineSeen=true; popup(W/2,H*0.32,'VURULAMAZ — KAÇ!','255,180,110',true); }
  }
  else f.kind='orb';
  if(f.kind==='gold')f.r=20; f.vy=rand(180,230)+difficulty*150; }

/* ===================== UPDATE ===================== */
function update(dt){
  t+=dt; stateT+=dt; bgPulse+=dt; hue+=dt*8;
  if(state===ST.PAUSE){ Audio.tick(dt,0.08); return; }   // donmuş sahne
  zoom=lerp(zoom,zoomT,0.12); zoomT=lerp(zoomT,1,0.08);
  shake=Math.max(0,shake-shake*8*dt-0.1); flash=Math.max(0,flash-dt*2.2);
  particles.update((p,dt)=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.92;p.vy*=0.95;p.life-=dt;return p.life>0;},dt);
  popups.update((p,dt)=>{p.y+=p.vy*dt;p.vy*=0.9;p.life-=dt;return p.life>0;},dt);

  if(state===ST.REVIVE){ reviveT-=dt; if(reviveT<=0) gameOver(); Audio.tick(dt,0.12); return; }   // donmuş sahne + 10sn
  if(state===ST.SPLASH){ spark(); if(stateT>3.2) enterHub(); Audio.tick(dt,0); return; }
  if(state===ST.CASE){ if(storeMsgT>0)storeMsgT-=dt; spark();
    if(caseState && !caseState.done){ caseState.t+=dt; if(caseState.t>=caseState.dur){ caseState.done=true; grantCase(caseState.won); } }
    Audio.tick(dt,0.08); return; }
  if(state!==ST.PLAY&&state!==ST.PAUSE){ if(storeMsgT>0)storeMsgT-=dt; if(reveal)reveal.t+=dt; spark(); Audio.tick(dt, state===ST.OVER?0.15:0.08); return; }   // PLAY/PAUSE dışındaki TÜM ekranlar: oyun mantığı çalışmaz (arka planda ateş sesi yok)

  // PLAY
  if(hitstop>0){ hitstop-=dt; Audio.tick(dt,0.25); return; }
  elapsed+=dt; if(levelUpT>0)levelUpT-=dt; if(cpBanT>0)cpBanT-=dt;
  difficulty=clamp(0.16*(level-1)+elapsed/120,0,1.8);     // her aşama belirgin hızlanma
  displayScore=lerp(displayScore,score,0.2);
  if(invuln>0)invuln-=dt; if(pwShield>0)pwShield-=dt; if(pwFire>0)pwFire-=dt;   // SADECE aktif etki süreleri (cooldown yok)
  if(fb){ fb.y+=fb.vy*dt; fb.t+=dt; shake=Math.max(shake,5);
    burst(fb.x+rand(-fb.w*0.28,fb.w*0.28), fb.y+18, '255,'+(140+(Math.random()*80|0))+',40', 2, 220, 0.45);
    fallers.each(f=>{ if(f.dead)return; if(Math.abs(f.x-fb.x)<fb.w/2 && f.y>=fb.y-24){ f.dead=true; burst(f.x,f.y,'255,150,50',14,640,0.7); score+=8; buzz(8); } });
    if(fb.y < -80) fb=null; }
  player.tx=pointerActive?pointerX:player.x;
  const dx=player.tx-player.x; player.x+=dx*Math.min(1,14*dt);
  const spd=Math.abs(dx);
  player.sx=lerp(player.sx,1+clamp(spd*0.004,0,0.35),0.2);
  player.sy=lerp(player.sy,1-clamp(spd*0.003,0,0.25),0.2);
  player.squash=lerp(player.squash,1,0.15);
  player.trail.unshift({x:player.x,y:player.y}); if(player.trail.length>14)player.trail.pop();
  if(safeT>0) safeT-=dt;                                  // güvenli pencere: yeni tehlike yok
  spawnTimer-=dt; const interval=clamp(0.62-difficulty*0.34,0.24,0.62);
  if(spawnTimer<=0){ spawnTimer=interval*rand(0.7,1.15); if(safeT<=0) spawn(); }
  // ZAMANLI BÜYÜK OLAYLAR (güvenli pencerede ertelenir)
  evBig-=dt;   if(evBig<=0){   evBig=20;  if(safeT<=0) spawnBoss(); }
  evMega-=dt;  if(evMega<=0){  evMega=100; spawnMega(); }
  evCross-=dt; if(evCross<=0){ evCross=60; if(safeT<=0) startCrossfire(); }
  if(crossT>0){ crossT-=dt; crossSpawn-=dt; if(crossSpawn<=0){ crossSpawn=0.5; spawnCrossPair(); } }
  // TABANCA: namludan otomatik mermi akışı + mermi-tehlike çarpışması
  fireTimer-=dt; if(muzzle>0)muzzle=Math.max(0,muzzle-dt*6);
  if(fireTimer<=0){ fireTimer = pwFire>0?0.07:FIRE_INTERVAL; fireBullet(); }
  bullets.update((b,dt)=>{
    b.y+=b.vy*dt; b.x+=(b.vx||0)*dt; b.t+=dt;
    if(b.y<-24||b.x<-30||b.x>W+30) return false;
    for(const f of fallers.list){ if(f.dead) continue;
      if(Math.hypot(f.x-b.x, f.y-b.y) < f.r+5){
        if(f.kind==='mine'||f.kind==='side'){ burst(b.x,b.y,'235,210,215',7,280,0.35); Audio.deflect(); return false; } // VURULAMAZ: sekti
        if(f.kind==='boss'){ f.hp-=curDmg(); burst(b.x,b.y,'255,180,180',6,300,0.3); Audio.hit2();
          if(f.hp<=0){ f.dead=true; score+=250; popup(f.x,f.y,'BOSS +250','255,170,170',true);
            burst(f.x,f.y,'255,80,90',64,900,1.0); Audio.record(); zoomPunch(1.3); shake=Math.max(shake,18); doFlash('255,90,110',0.6); buzz([30,50,30,50]); }
          return false; }
        if(f.kind==='mega'){ collectMega(f); f.dead=true; return false; }
        if(f.kind==='hazard') destroyHazard(f); else collectFaller(f);
        f.dead=true; return false;
      } }
    return true;
  },dt);
  const py=player.y, pr=player.r;
  fallers.update((f,dt)=>{
    if(f.dead) return false;
    f.t+=dt; f.y+=f.vy*dt; f.x+=(f.vx||0)*dt; f.spin+=dt*3;
    // yandan gelenler ortadaki boşlukta durur (orta = güvenli bölge)
    if(f.kind==='side' && ((f.vx>0&&f.x>=f.stopx)||(f.vx<0&&f.x<=f.stopx))) return false;
    const dist=Math.hypot(f.x-player.x, f.y-py);
    if(dist<f.r+pr*0.92){
      if(f.kind==='hazard'||f.kind==='mine'||f.kind==='boss'||f.kind==='side'){ if(invuln>0) return true; die(); return false; }
      if(f.kind==='mega'){ collectMega(f); return false; }
      collectFaller(f); player.squash=f.kind==='gold'?1.5:1.28; player.sx=1.4; player.sy=0.7;
      return false;
    }
    if(f.y>H+40){ if(f.kind==='orb'){ if(combo>1){Audio.miss();popup(f.x,H-60,'kombo!','120,130,160',false);} combo=1; } return false; }
    return true;
  },dt);
  if(score>=levelBase+levelGoal) levelUp();               // aşama hedefi doldu → STAGE +1
  Audio.tick(dt, clamp(0.2+difficulty*0.5+Math.min(0.4,combo*0.02),0,1));
}

/* ===================== RENDER ===================== */
function glowCircle(x,y,r,color,glow){ ctx.save();ctx.shadowColor=`rgba(${color},.9)`;ctx.shadowBlur=glow;
  ctx.fillStyle=`rgba(${color},1)`;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();ctx.restore(); }
function bg(){
  const pulse=0.5+0.5*Math.sin(bgPulse*2);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,hsl((hue+200)%360,60,6+pulse*2)); g.addColorStop(1,hsl(hue%360,70,4));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  if(bgImg && bgImg.complete && bgImg.naturalWidth){   // AI arka plan (cover-fit + karartma)
    const s=Math.max(W/bgImg.naturalWidth,H/bgImg.naturalHeight), iw=bgImg.naturalWidth*s, ih=bgImg.naturalHeight*s;
    ctx.globalAlpha=0.5; ctx.drawImage(bgImg,(W-iw)/2,(H-ih)/2,iw,ih); ctx.globalAlpha=1;
    ctx.fillStyle='rgba(5,7,16,0.45)'; ctx.fillRect(0,0,W,H);
  }
  ctx.strokeStyle=hsl(hue%360,80,55, state===ST.PLAY?(0.05+difficulty*0.06):0.04); ctx.lineWidth=1;
  const gs=Math.max(40,W/10), ox=(t*30)%gs;
  ctx.beginPath(); for(let x=-ox;x<W;x+=gs){ctx.moveTo(x,0);ctx.lineTo(x,H);} for(let y=(t*40)%gs;y<H;y+=gs){ctx.moveTo(0,y);ctx.lineTo(W,y);} ctx.stroke();
  const v=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.75);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,0.55)'); ctx.fillStyle=v; ctx.fillRect(0,0,W,H);
}
function star(x,y,R,r,n,color){ ctx.save();ctx.shadowColor=`rgba(${color},.9)`;ctx.shadowBlur=20;ctx.fillStyle=`rgba(${color},1)`;ctx.beginPath();
  for(let i=0;i<n*2;i++){const a=Math.PI*i/n-Math.PI/2,rad=i%2?r:R;ctx.lineTo(x+Math.cos(a)*rad,y+Math.sin(a)*rad);} ctx.closePath();ctx.fill();ctx.restore(); }
function drawFaller(f){ ctx.save();ctx.translate(f.x,f.y);const pop=easeOutBack(clamp(f.t/0.25,0,1));ctx.scale(pop,pop);
  if(f.kind==='orb'){ glowCircle(0,0,f.r,GAME.orb,22); ctx.fillStyle='rgba(255,255,255,.85)';ctx.beginPath();ctx.arc(-f.r*0.25,-f.r*0.25,f.r*0.3,0,7);ctx.fill(); }
  else if(f.kind==='gold'){ ctx.rotate(f.spin); star(0,0,f.r*1.2,f.r*0.55,5,'255,215,90'); }
  else if(f.kind==='hazard'){ ctx.rotate(f.spin); star(0,0,f.r*1.25,f.r*0.5,4,'255,70,100'); }
  else if(f.kind==='boss'){ // BÜYÜK kırmızı boss — can barlı (silah güçlenince devrilir)
    const bw=f.r*2.6, hpf=clamp(f.hp/f.maxhp,0,1);
    ctx.save(); ctx.shadowBlur=0;
    rr(-bw/2,-f.r*1.75,bw,8,4); ctx.fillStyle='rgba(45,12,16,.9)'; ctx.fill();
    rr(-bw/2,-f.r*1.75,bw*hpf,8,4); ctx.fillStyle=hpf>0.3?'rgba(255,70,80,1)':'rgba(255,170,60,1)'; ctx.fill();
    ctx.fillStyle='#ffd6d6'; ctx.font="700 13px 'Trebuchet MS'"; ctx.textAlign='center'; ctx.fillText(Math.ceil(f.hp)+'/'+f.maxhp,0,-f.r*2.0);
    ctx.restore();
    ctx.rotate(f.spin*0.4); const plb=1+0.12*Math.sin(f.t*7);
    ctx.save(); ctx.shadowColor='rgba(255,55,65,.95)'; ctx.shadowBlur=26; ctx.strokeStyle='rgba(255,90,100,.9)'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(0,0,f.r*1.25*plb,0,7); ctx.stroke(); ctx.restore();
    star(0,0,f.r*1.15,f.r*0.55,8,'255,60,80');
    ctx.save(); ctx.shadowColor='rgba(255,210,210,.9)'; ctx.shadowBlur=14; ctx.fillStyle='rgba(255,235,235,1)';
    ctx.beginPath(); ctx.arc(0,0,f.r*0.32,0,7); ctx.fill(); ctx.restore();
  }
  else if(f.kind==='mega'){ // BÜYÜK yeşil +1000
    ctx.rotate(f.spin); const plm=1+0.1*Math.sin(f.t*6);
    glowCircle(0,0,f.r*plm,'80,255,135',30); star(0,0,f.r*0.8,f.r*0.38,5,'200,255,215');
    ctx.fillStyle='rgba(255,255,255,.92)'; ctx.beginPath(); ctx.arc(-f.r*0.24,-f.r*0.24,f.r*0.2,0,7); ctx.fill();
  }
  else if(f.kind==='side'){ // yandan gelen vurulamaz kırmızı
    ctx.rotate(f.spin);
    ctx.save(); ctx.shadowColor='rgba(255,70,80,.9)'; ctx.shadowBlur=14; ctx.strokeStyle='rgba(255,120,120,.9)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,f.r*1.2,0,7); ctx.stroke(); ctx.restore();
    glowCircle(0,0,f.r*0.78,'255,80,90',16);
  }
  else { // VURULAMAZ mayın: nabız atan kalkan halkası + dikenli gri gövde + kırmızı çekirdek
    ctx.rotate(f.spin*0.6); const pl=1+0.1*Math.sin(f.t*9);
    ctx.save(); ctx.shadowColor='rgba(200,220,255,.9)'; ctx.shadowBlur=12; ctx.strokeStyle='rgba(215,228,255,.95)'; ctx.lineWidth=3.5;
    ctx.beginPath(); ctx.arc(0,0,f.r*1.3*pl,0,7); ctx.stroke(); ctx.restore();
    star(0,0,f.r*1.05,f.r*0.62,6,'170,185,225');
    ctx.save(); ctx.shadowColor='rgba(255,70,90,.95)'; ctx.shadowBlur=10; ctx.fillStyle='rgba(255,85,105,1)';
    ctx.beginPath(); ctx.arc(0,0,f.r*0.42,0,7); ctx.fill(); ctx.restore();
  } ctx.restore(); }
function drawPlayer(){ const tl=player.trail;
  for(let i=tl.length-1;i>0;i--){const a=(1-i/tl.length)*0.35;ctx.fillStyle=hsl(hue%360,90,60,a);ctx.beginPath();ctx.arc(tl[i].x,tl[i].y,player.r*(1-i/tl.length)*0.9,0,7);ctx.fill();}
  ctx.save();ctx.translate(player.x,player.y);ctx.scale(player.sx*player.squash,player.sy*(2-player.squash));
  glowCircle(0,0,player.r,GAME.player,26+(state===ST.PLAY?8*Math.sin(t*10):0));
  ctx.fillStyle='rgba(255,255,255,.9)';ctx.beginPath();ctx.arc(-6,-6,player.r*0.32,0,7);ctx.fill();ctx.restore();
  drawSkin(equippedSkin, player.x, player.y, player.r);
  drawGun();
  if(invuln>0){ ctx.save(); ctx.translate(player.x,player.y); const p=0.7+0.3*Math.sin(t*14);
    ctx.strokeStyle=`rgba(120,200,255,${0.5*p})`; ctx.shadowColor='rgba(120,200,255,.8)'; ctx.shadowBlur=14; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,player.r+11,0,7); ctx.stroke(); ctx.restore(); } }
/* Skin kozmetiği — canlı oyuncunun üstüne çizilir; önizleme için drawAvatar kullan. */
function drawAvatar(key,x,y,r){ ctx.save(); glowCircle(x,y,r,GAME.player,14);
  ctx.fillStyle='rgba(255,255,255,.85)'; ctx.beginPath(); ctx.arc(x-r*0.28,y-r*0.28,r*0.3,0,7); ctx.fill(); ctx.restore(); drawSkin(key,x,y,r); }
function drawSkin(key,x,y,r){ if(!key||key==='default') return; ctx.save(); ctx.translate(x,y);
  if(key==='cowboy'){ ctx.fillStyle='#8a5a2b'; ctx.strokeStyle='#5e3a18'; ctx.lineWidth=Math.max(1.5,r*0.06);
    ctx.beginPath(); ctx.ellipse(0,-r*0.62,r*1.3,r*0.34,0,0,7); ctx.fill(); ctx.stroke();
    ctx.beginPath(); rr(-r*0.5,-r*1.18,r,r*0.62,r*0.12); ctx.fill(); ctx.stroke();

  ctx.fillStyle=hsl(accent,70,12); ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle=hsl(accent,90,60,.6+0.4*fl); ctx.stroke();
  ctx.shadowBlur=0; ctx.textAlign='center'; ctx.font=`900 ${Math.min(26,h*0.42)}px 'Trebuchet MS'`; ctx.fillStyle=hsl(accent,90,75); ctx.fillText(label,W/2,cy+h*0.15);
  ctx.restore(); BTNS.push({x,y,w,h,action}); }
function toggleRow(label,val,cy,action){ const w=Math.min(420,W*0.82),x=W/2-w/2,h=64,y=cy-h/2;
  ctx.save(); rr(x,y,w,h,16); ctx.fillStyle='rgba(20,28,55,.6)'; ctx.fill(); ctx.lineWidth=1; ctx.strokeStyle='rgba(60,80,140,.6)'; ctx.stroke();
  ctx.textAlign='left'; ctx.font="700 20px 'Trebuchet MS'"; ctx.fillStyle='#cdd8f5'; ctx.shadowBlur=0; ctx.fillText(label,x+22,cy+7);
  // toggle pill
  const pw=58,ph=30,px=x+w-pw-22,py=cy-ph/2; ctx.shadowColor=val?'rgba(120,255,180,.8)':'transparent'; ctx.shadowBlur=val?12:0;
  rr(px,py,pw,ph,ph/2); ctx.fillStyle=val?hsl(150,80,45):'rgba(70,80,110,.8)'; ctx.fill(); ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(val?px+pw-ph/2:px+ph/2, cy, ph/2-4, 0,7); ctx.fillStyle='#fff'; ctx.fill();
  ctx.restore(); BTNS.push({x,y,w,h,action}); }
function backChip(dest){ const r=Math.min(20,W*0.052), x=r+15, y=r+15; ctx.save();
  ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fillStyle='rgba(20,26,46,.92)'; ctx.fill();

  BTNS.push({x:x-r,y:y-r,w:r*2,h:r*2,action:()=>goto(dest)}); }
function drawCaseItem(it,cx,cy,w,h){ const rc=RARITY[it.rarity]; ctx.save();
  ctx.shadowColor='rgba('+rc+',.5)'; ctx.shadowBlur=10; rr(cx-w/2,cy-h/2,w,h,10);
  const g=ctx.createLinearGradient(0,cy-h/2,0,cy+h/2); g.addColorStop(0,'rgba('+rc+',.3)'); g.addColorStop(1,'rgba(10,12,24,.95)'); ctx.fillStyle=g; ctx.fill();
  ctx.shadowBlur=0; ctx.lineWidth=2; ctx.strokeStyle='rgba('+rc+',.85)'; ctx.stroke();
  if(it.type==='skin') drawAvatar(it.val,cx,cy-h*0.06,Math.min(w,h)*0.2);
  else if(it.type==='power'){ ctx.save(); ctx.shadowColor='rgba('+POWERS[it.val].col+',.8)'; ctx.shadowBlur=10; powerIcon(it.val,cx,cy-h*0.06,Math.min(w,h)*0.17); ctx.restore(); }
  else { ctx.textAlign='center'; ctx.font='900 '+Math.min(w,h)*0.32+"px 'Trebuchet MS'"; ctx.fillStyle='#fff'; ctx.fillText('💎',cx,cy+h*0.02); }
  ctx.textAlign='center'; ctx.font='800 '+Math.min(12,w*0.17)+"px 'Trebuchet MS'"; ctx.fillStyle='#eef2ff'; ctx.fillText(it.label, cx, cy+h*0.37);
  ctx.restore(); }

    // ---- raf kartı (panel + tıklama alanı) ----
    const shelf=(x,y,w,h,hue,action,glow)=>{ ctx.save(); ctx.shadowColor=hsl(hue,90,60,glow?0.55:0.28); ctx.shadowBlur=glow?16:8;

    const pricePill=(cx,cy,s,hue,sz)=>{ const w=ctx.measureText(s).width; ctx.save(); ctx.font='800 '+sz+"px 'Trebuchet MS'"; const pw=ctx.measureText(s).width+sz*1.1,ph=sz*1.55;

      ctx.fillStyle=hsl(hue,92,82); ctx.textAlign='center'; ctx.fillText(s,cx,cy+sz*0.34); ctx.restore(); };
    const drawChest=(cx,cy,s,hue)=>{ ctx.save(); ctx.translate(cx,cy);
      ctx.shadowColor=hsl(hue,90,60,.85); ctx.shadowBlur=14;

      ctx.shadowBlur=0; ctx.fillStyle=hsl(hue,82,60); ctx.fillRect(-s*0.52,-s*0.09,s*1.04,s*0.06);
      ctx.fillStyle=hsl(hue,40,15); ctx.fillRect(-s*0.05,-s*0.42,s*0.10,s*0.44);
      ctx.fillStyle='#ffd560'; ctx.shadowColor='rgba(255,210,90,.9)'; ctx.shadowBlur=8; rr(-s*0.12,-s*0.12,s*0.24,s*0.22,4); ctx.fill();
      ctx.shadowBlur=0; ctx.fillStyle=hsl(hue,60,16); ctx.beginPath(); ctx.arc(0,-s*0.02,s*0.045,0,7); ctx.fill(); ctx.restore(); };
    const drawGem=(cx,cy,s,col)=>{ ctx.save(); ctx.translate(cx,cy); ctx.shadowColor='rgba('+col+',.9)'; ctx.shadowBlur=12;

    if(viewScrollMax>0){ const tr=bot-top, th=Math.max(28,tr*tr/yacc), ty=top+(tr-th)*(viewScroll/viewScrollMax); ctx.save(); ctx.fillStyle='rgba(120,160,230,.5)'; rr(W-7,ty,4,th,2); ctx.fill(); ctx.restore(); }
    backChip(ST.MENU);
    center('skorun her oyunda güncellenir · haftalık sıfırlanır', H*0.965, Math.min(11,W*0.029), 'rgba(150,170,210,.7)', 3);
  }
  if(state===ST.PLAY||state===ST.PAUSE){
    ctx.save();ctx.textAlign='left';ctx.font="900 54px 'Trebuchet MS'";ctx.fillStyle='#fff';
    ctx.shadowColor=hsl(hue%360,90,60,.8);ctx.shadowBlur=12;ctx.fillText(Math.floor(displayScore),22,66);
    if(combo>1){const ps=1+0.06*Math.sin(t*16);ctx.font=`900 ${30*ps}px 'Trebuchet MS'`;
      ctx.fillStyle=hsl((hue+40)%360,90,65);ctx.shadowColor=hsl((hue+40)%360,90,60,.9);ctx.shadowBlur=16;ctx.fillText('x'+combo,24,104);}
    ctx.restore();
    ctx.save(); ctx.textAlign='left'; ctx.font="700 16px 'Trebuchet MS'"; ctx.fillStyle='rgba(150,255,210,.95)';
    ctx.shadowColor='rgba(120,255,200,.55)'; ctx.shadowBlur=6; ctx.fillText('GÜÇ '+weaponDmg(), 24, 132); ctx.restore();
    // AŞAMA göstergesi (üst orta) + ilerleme çubuğu + ek bilgiler
    const prog=clamp((score-levelBase)/levelGoal,0,1), remain=Math.max(0,Math.ceil(levelBase+levelGoal-score)), near=prog>0.85;
    const bw=Math.min(210,W*0.46), bx=W/2-bw/2, by=46;
    ctx.save(); ctx.textAlign='center';
    ctx.font="900 17px 'Trebuchet MS'"; ctx.fillStyle='#dce8ff'; ctx.shadowColor='rgba(160,190,255,.7)'; ctx.shadowBlur=8;
    ctx.fillText('AŞAMA '+level, W/2, by-7); ctx.shadowBlur=0;
    // en iyi aşama (sağ üst köşesi)
    ctx.textAlign='right'; ctx.font="800 11px 'Trebuchet MS'"; ctx.fillStyle='rgba(255,215,120,.85)'; ctx.fillText('★ en iyi '+bestStage, bx+bw, by-9);
    // çubuk arka + dolum
    rr(bx,by,bw,8,4); ctx.fillStyle='rgba(40,50,90,.75)'; ctx.fill();
    rr(bx,by,Math.max(8,bw*prog),8,4); ctx.fillStyle=hsl(280,90,near?72:66); ctx.shadowColor='rgba(190,140,255,'+(near?1:0.8)+')'; ctx.shadowBlur=near?12:8; ctx.fill(); ctx.shadowBlur=0;
    // çeyrek çentikler
    ctx.strokeStyle='rgba(8,12,28,.6)'; ctx.lineWidth=1.5; for(let q=1;q<4;q++){ ctx.beginPath(); ctx.moveTo(bx+bw*q/4,by); ctx.lineTo(bx+bw*q/4,by+8); ctx.stroke(); }
    // dolum başında parlayan yıldız
    { const hx=bx+Math.max(8,bw*prog), sp=1+(near?0.22*Math.sin(t*12):0); ctx.save(); ctx.translate(hx,by+4); star(0,0,5.5*sp,2.4*sp,5,'255,240,180'); ctx.restore(); }
    // kalan puan / yaklaştın
    ctx.textAlign='center'; ctx.font="800 11px 'Trebuchet MS'"; ctx.fillStyle=near?hsl((t*200)%360,90,72):'rgba(190,205,240,.85)';
    ctx.fillText(near?'YAKLAŞTIN!':('sonraki: '+remain), W/2, by+22);
    ctx.restore();
    drawLives(W/2-29, 84, 17);                 // 3 kalp (üst orta)
    if(goldenCP>0){ ctx.save(); ctx.textAlign='right'; ctx.font="900 14px 'Trebuchet MS'"; ctx.fillStyle='rgba(255,215,90,.95)'; ctx.shadowColor='rgba(255,200,70,.7)'; ctx.shadowBlur=6; ctx.fillText('🏅×'+goldenCP, W-16, 30); ctx.restore(); }   // altın checkpoint hakkı
    if(state===ST.PLAY){ drawPauseBtn(); drawPowerBtns(); }
  }
  // AŞAMA geçiş kutlaması (büyük banner)
  if(levelUpT>0 && (state===ST.PLAY||state===ST.PAUSE)){
    const a=clamp(levelUpT/1.5,0,1), pop=easeOutBack(clamp((1.5-levelUpT)/0.3,0,1));
    center('AŞAMA '+level, H*0.40, Math.min(72,W*0.17)*pop, hsl(280,90,70), 28, a);
    center('hız artıyor!', H*0.40+46, 19, 'rgba(205,175,255,.95)', 10, a);
  }
  if(cpBanT>0 && (state===ST.PLAY||state===ST.PAUSE)){   // ALTIN CHECKPOINT banner
    const a=clamp(cpBanT/2.4,0,1), pop=easeOutBack(clamp((2.4-cpBanT)/0.35,0,1));
    center('🏅 CHECKPOINT', H*0.30, Math.min(48,W*0.12)*pop, hsl(46,95,62), 26, a);
    center('Aşama '+checkpointStage+'’e kaydedildi', H*0.30+38, 16, 'rgba(255,230,150,.95)', 8, a);
  }
  if(state===ST.PAUSE){
    ctx.fillStyle='rgba(5,6,15,0.62)'; ctx.fillRect(0,0,W,H);
    center('⏸  DURAKLATILDI', H*0.17, Math.min(34,W*0.085),'#fff',14);
    button('▶  DEVAM', H*0.29, Math.min(280,W*0.7), 62, ()=>goto(ST.PLAY), 160);
    toggleRow('🎵  Müzik', Settings.music, H*0.44, ()=>{Settings.music=!Settings.music;Audio.setMusic(Settings.music);saveSettings();});
    toggleRow('🔊  Efektler', Settings.sfx, H*0.44+78, ()=>{Settings.sfx=!Settings.sfx;Audio.setSfx(Settings.sfx);saveSettings();});
    toggleRow('📳  Titreşim', Settings.haptics, H*0.44+156, ()=>{Settings.haptics=!Settings.haptics;saveSettings();buzz(20);});
    button('⟳  YENİDEN', H*0.75, Math.min(260,W*0.64), 54, startGame, 280);
    button('☰  MENÜ', H*0.85, Math.min(260,W*0.64), 50, ()=>goto(ST.MENU), 200);
  }
  if(state===ST.REVIVE){
    ctx.fillStyle='rgba(5,6,15,0.84)'; ctx.fillRect(0,0,W,H);
    center('DEVAM ET?', H*0.22, Math.min(40,W*0.1), '#fff', 16);
    center('bir kalp harca, kaldığın yerden devam et', H*0.28, 14, 'rgba(200,210,240,.9)', 6);
    const hr=Math.min(64,W*0.17), hy=H*0.45;
    const pulse=1+0.08*Math.sin(t*8);
    drawHeart(W/2, hy, hr*pulse, true);                 // tıklanabilir büyük kalp
    BTNS.push({x:W/2-hr, y:hy-hr, w:hr*2, h:hr*2, action:revive});
    center('▲ KALBE DOKUN', hy+hr*0.7, 15, 'rgba(255,150,160,.95)', 6);
    drawLives(W/2-29, H*0.62, 17);
    center(lives+' / 3 kalp  ·  her kalp ½ saatte 1 dolar', H*0.67, 13, 'rgba(255,150,160,.8)', 4);
    const frac=clamp(reviveT/10,0,1);
    center(Math.ceil(reviveT)+' sn', H*0.74, Math.min(40,W*0.1), hsl(frac*120,90,60), 12);
    button('☰  VAZGEÇ', H*0.86, Math.min(230,W*0.58), 50, gameOver, 0);
  }
  if(state===ST.OVER){
    ctx.fillStyle='rgba(5,6,15,0.55)';ctx.fillRect(0,0,W,H);
    const ap=easeOut(clamp(stateT/0.5,0,1));
    if(newRecord) center('🏆 YENİ REKOR!', H*0.24, Math.min(44,W*0.11), hsl((t*120)%360,90,65),24,ap);
    else center('BİTTİ', H*0.25, Math.min(56,W*0.14),'#fff',16,ap);
    center('SKOR', H*0.37, 18,'rgba(160,180,220,.8)',6,ap);
    center(score, H*0.44, Math.min(64,W*0.16), hsl(190,90,65),20,ap);
    center('aşama '+level+'  ·  en yüksek kombo x'+bestCombo, H*0.52, 19,'rgba(200,180,255,.95)',8,ap);
    center('en iyi aşama '+bestStage+'   ·   rekor '+best, H*0.575, 16,'rgba(150,170,210,.85)',6,ap);
    if(overMsg) center(overMsg, H*0.63, Math.min(21,W*0.054), newRecord?hsl((t*140)%360,90,68):'rgba(255,214,150,.96)', newRecord?14:8, ap);
    const cpAvail = goldenCP>0 && checkpointStage>=10;
    if(stateT>0.4){
      if(cpAvail){
        button('🏅  Aşama '+checkpointStage+'’den DEVAM  ('+goldenCP+' hak)', H*0.70, Math.min(310,W*0.74), 56, useCheckpoint, 46);
        button('▶  BAŞTAN', H*0.775, Math.min(240,W*0.6), 46, startGame, 160);
        button('☰  MENÜ', H*0.84, Math.min(240,W*0.6), 44, ()=>goto(ST.MENU), 280);
      } else {
        button('▶  TEKRAR', H*0.715, Math.min(280,W*0.66), 56, startGame, 160);
        button('🏆  SIRALAMA', H*0.79, Math.min(280,W*0.66), 46, ()=>{ if(window.Android&&Android.showLeaderboard){ try{Android.showLeaderboard();}catch(e){} } else goto(ST.LEADER); }, 30);
        button('☰  MENÜ', H*0.86, Math.min(280,W*0.66), 46, ()=>goto(ST.MENU), 280);
      }
    }
  }

  if(fb){ const s=fb.w*0.5, fl=1+0.14*Math.sin(t*34);
    // yok edilen kolon ışıması (yanlar boş)
    ctx.save(); const bg=ctx.createLinearGradient(fb.x-s,0,fb.x+s,0); bg.addColorStop(0,'rgba(255,120,30,0)'); bg.addColorStop(0.5,'rgba(255,150,50,0.32)'); bg.addColorStop(1,'rgba(255,120,30,0)');
    ctx.fillStyle=bg; ctx.fillRect(fb.x-s, fb.y-30, fb.w, H); ctx.restore();
    // alev gövdesi (görseldeki gibi yukarı bakan damla)
    ctx.save(); ctx.translate(fb.x,fb.y); ctx.shadowColor='rgba(255,120,30,.95)'; ctx.shadowBlur=34;
    const g=ctx.createLinearGradient(0,-s*1.7*fl,0,s*0.9); g.addColorStop(0,'#fff6b0'); g.addColorStop(0.45,'#ff9a2a'); g.addColorStop(1,'#ff3410');
    ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(0,-s*1.7*fl); ctx.bezierCurveTo(s*1.05,-s*0.3, s*0.95,s*0.7, 0,s*0.9); ctx.bezierCurveTo(-s*0.95,s*0.7,-s*1.05,-s*0.3,0,-s*1.7*fl); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='#fff7d6'; ctx.beginPath(); ctx.ellipse(0,s*0.1,s*0.32,s*0.6,0,0,7); ctx.fill(); ctx.restore(); }
  if(timeScale>1.12 && state===ST.PLAY){ ctx.save(); ctx.globalAlpha=clamp((timeScale-1)*0.6,0,0.55); ctx.strokeStyle='rgba(255,224,120,0.9)'; ctx.lineWidth=2; ctx.shadowColor='rgba(255,224,120,.8)'; ctx.shadowBlur=6;
    for(let i=0;i<11;i++){ const yy=(t*1100+i*89)%H; ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(70,yy); ctx.moveTo(W-70,(yy+40)%H); ctx.lineTo(W,(yy+40)%H); ctx.stroke(); }
    ctx.restore(); ctx.save(); ctx.globalAlpha=clamp((timeScale-1)*0.3,0,0.25); ctx.fillStyle='rgba(255,200,60,1)';
    const g=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.7); g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(255,190,40,0.5)'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); ctx.restore(); }
  if(flash>0){ ctx.fillStyle=`rgba(${flashColor},${flash})`; ctx.fillRect(0,0,W,H); }
}

lives=loadLives();   // kayıtlı canları (gerçek-zaman dolumla) yükle
let last=performance.now();
function loop(now){ let dt=(now-last)/1000; last=now; dt=Math.min(dt,0.05);
  if(state===ST.PLAY && sonicT>0) sonicT-=dt;
  const tgt = (state===ST.PLAY && sonicT>0) ? (sonicT>2 ? 2.0 : 1+(sonicT/2)) : 1;   // 10sn hızlı → son ~2sn yavaşlayarak normale
  timeScale = lerp(timeScale, tgt, 0.07);
  update(state===ST.PLAY ? dt*timeScale : dt); render(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
</body>
</html>
